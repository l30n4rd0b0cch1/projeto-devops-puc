name: Flutter

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Ativar suporte Web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project source
        run: flutter analyze
