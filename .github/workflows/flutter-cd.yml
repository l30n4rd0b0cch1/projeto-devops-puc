name: Flutter CD

on:
  push:
    branches: [ main ]

jobs:
  deliver:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: web-flutter
          path: build/web

  deploy:
    runs-on: ubuntu-latest
    needs: deliver

    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: web-flutter

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .